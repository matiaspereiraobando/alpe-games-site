name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Validate registry
        run: npm run validate:registry

      - name: Astro check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Check game embed URLs (main only)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: node scripts/check-embed-urls.mjs
